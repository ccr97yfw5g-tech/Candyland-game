<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candyland Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🍭 Candyland Game 🍬</h1>
            <div class="game-status">
                <p id="current-player">Current Player: <span>Waiting to start...</span></p>
                <p id="game-message">Game Status: Select difficulty and click Start Game!</p>
            </div>
        </header>

        <main>
            <div class="game-board">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
            </div>

            <div class="game-controls-section">
                <div class="difficulty-select">
                    <label for="difficultySelect">Difficulty:</label>
                    <select id="difficultySelect">
                        <option value="easy">🟢 Easy</option>
                        <option value="medium" selected>🟡 Medium</option>
                        <option value="hard">🔴 Hard</option>
                    </select>
                </div>

                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">🎮 Start Game</button>
                    <div id="gameControls" style="display: none;">
                        <button id="rollDiceBtn" class="btn btn-primary">🎲 Roll Dice</button>
                        <button id="resetBtn" class="btn btn-secondary">Reset Game</button>
                    </div>
                </div>

                <div class="audio-controls">
                    <button id="muteBtn" class="btn btn-audio">🔊 Mute</button>
                </div>

                <div class="stats-panel">
                    <h3>Game Stats</h3>
                    <div class="stats-content">
                        <p><strong>Difficulty:</strong> <span id="difficultyDisplay">Medium</span></p>
                        <p><strong>Turn:</strong> <span id="turnDisplay">0</span></p>
                        <p><strong>Status:</strong> <span id="statusDisplay">Waiting...</span></p>
                    </div>
                </div>
            </div>

            <div class="player-stats">
                <h3>Players</h3>
                <div id="playersList" class="players-list">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </main>

        <footer>
            <p>Reach the Candy Castle to win! 🏰 | Collect power-ups and avoid traps! ⭐</p>
        </footer>
    </div>

    <script src="js/powerup.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/player.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
